<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan Tran — Computer Engineering</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
        }
      }
    }
  </script>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }

    ::selection {
      background-color: #111111;
      color: #ffffff;
    }

    .dark ::selection {
      background-color: #ededed;
      color: #0a0a0a;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4d4d4;
      border-radius: 10px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #404040;
      background-clip: content-box;
      border: 3px solid transparent;
    }

    /* Reveal on load — subtle fade + lift, staggered via --d */
    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      opacity: 0;
      animation: reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        animation: none;
        opacity: 1;
      }

      * {
        scroll-behavior: auto !important;
      }
    }

    /* Camera aperture mark — blades drift open on hover */
    .aperture {
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .group:hover .aperture {
      transform: rotate(60deg);
    }

    /* Theme switch — circular reveal wiping from the toggle (View Transitions) */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    ::view-transition-old(root) {
      z-index: 1;
    }

    ::view-transition-new(root) {
      z-index: 9999;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0"
  }
}
</script>
</head>

<body
  class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 overflow-x-hidden antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
