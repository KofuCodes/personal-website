<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Tran | Computer Engineering</title>
    <link rel="icon" type="image/jpeg" href="/logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              heading: ['Space Grotesk', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat:wght@400;500;600;700&family=Courier+Prime:wght@400;700&family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            background: #f5e6d3;
        }
        .dark body {
            background: #2a2318;
        }
        .mono {
            font-family: 'Courier Prime', 'Courier New', monospace;
        }
        .font-heading {
            font-family: 'Special Elite', cursive;
        }
        .handwritten {
            font-family: 'Caveat', cursive;
        }
        ::selection {
            background-color: #d4a574;
            color: #2a2318;
        }
        .dark ::selection {
            background-color: #8B7355;
            color: #f5e6d3;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c4a882;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #6b5744;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1785d;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #8B7355;
        }

        @keyframes polaroidDevelop {
          0% {
            opacity: 0;
            filter: brightness(2) contrast(0.3) saturate(0);
          }
          50% {
            opacity: 0.7;
            filter: brightness(1.3) contrast(0.7) saturate(0.5);
          }
          100% {
            opacity: 1;
            filter: brightness(1) contrast(1) saturate(1);
          }
        }
        .polaroid-develop {
          animation: polaroidDevelop 2.5s ease-out forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#f5e6d3] dark:bg-[#2a2318] text-[#2a2318] dark:text-[#e8dcc8] selection:bg-[#d4a574] transition-colors duration-500 overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
